<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔒 CSP do front -->
    <!-- unsafe-inline é necessário porque o vite-plugin-singlefile injeta assets inline -->
    <!-- frame-ancestors não funciona via meta tag; se precisar, configure no servidor HTTP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        connect-src 'self' http://localhost:8080 https://gupify-api.onrender.com;
        img-src 'self' data:;
        font-src 'self' data: https://fonts.gstatic.com;
      "
    />

    <title>Gupify — Otimizador de Perfil e Currículo para a Gupy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔒 FIX #4 (Média): Content Security Policy -->
    <!-- Restringe origens de scripts, estilos, conexões e iframes -->
    <!-- unsafe-inline necessário pois vite-plugin-singlefile injeta tudo inline -->
    <!-- frame-ancestors bloqueia clickjacking mesmo sem header HTTP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        connect-src 'self' https://gupify.onrender.com;
        img-src 'self' data:;
        font-src 'self';
        frame-ancestors 'none';
      "
    />

    <title>Gupify — Otimizador de Perfil e Currículo para a Gupy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
